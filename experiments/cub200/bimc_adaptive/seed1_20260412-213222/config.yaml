DATALOADER:
  NUM_WORKERS: 4
  TEST:
    BATCH_SIZE: 100
  TRAIN:
    BATCH_SIZE_BASE: 64
    BATCH_SIZE_INC: 64
DATASET:
  BETA: 0.3
  ENSEMBLE_ALPHA: 0.8
  GPT_PATH: description/modified_cub200_output.json
  NAME: cub200
  NUM_BASE_SHOT: -1
  NUM_CLASSES: 200
  NUM_INC_CLS: 10
  NUM_INC_SHOT: 5
  NUM_INIT_CLS: 100
  ROOT: dataset/CUB_200_2011/
DEVICE:
  DEVICE_NAME: cuda
  GPU_ID: 0;
METHOD: bimc_adaptive
MODEL:
  BACKBONE:
    NAME: ViT-B/16
OUTPUT:
  ROOT: experiments
SEED: 1
TRAINER:
  BiMC:
    GAMMA_BASE: 1.0
    GAMMA_INC: 5.0
    LAMBDA_I: 0.1
    LAMBDA_T: 0.5
    PREC: fp16
    TAU: 16
    TEXT_CALIBRATION: true
    USING_ENSEMBLE: false
    VISION_CALIBRATION: true
  BiMCAdaptive:
    AGREEMENT_POWER: 1.0
    BETA_MODE: classwise
    BETA_SHRINKAGE_NU: 5.0
    ENABLE_ADAPTIVE_BETA: false
    ENABLE_ADAPTIVE_TEXT: false
    ENABLE_ADAPTIVE_VISION: false
    EPS: 1.0e-06
    MAX_KAPPA: 1000.0
    MAX_VISION_WEIGHT: 0.35
    MAX_WEIGHT: 0.95
    MIN_AGREEMENT: 0.05
    MIN_VISION_WEIGHT: 0.0
    MIN_WEIGHT: 0.05
    PROMPT_TEMPLATES:
    - a photo of a {}.
    - a close-up photo of a {}.
    - a centered photo of a {}.
    - a bright photo of a {}.
    - a cropped photo of a {}.
    - a clean photo of a {}.
    - a detailed photo of a {}.
    RELIABILITY_COUNT_POWER: 0.5
    RELIABILITY_LOGIT_SCALE: 0.5
    SINGLETON_KAPPA: 1.0
    TEXT_SHRINKAGE_NU: 8.0
    USE_AGREEMENT_GATE: true
    USE_PROMPT_ENSEMBLE: true
    VISION_SHRINKAGE_NU: 5.0
