METHOD: "bimc_adaptive"
SEED: 1

DEVICE:
  DEVICE_NAME: "cuda"
  GPU_ID: "0;"

DATALOADER:
  TRAIN:
    BATCH_SIZE_BASE: 64
    BATCH_SIZE_INC: 64
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 4

MODEL:
  BACKBONE:
    NAME: "ViT-B/16"

TRAINER:
  BiMC:
    PREC: "fp16"
    VISION_CALIBRATION: True
    LAMBDA_I: 0.1
    TAU: 16
    TEXT_CALIBRATION: True
    LAMBDA_T: 0.5
    GAMMA_BASE: 1.0
    GAMMA_INC: 5.0
    USING_ENSEMBLE: False

  BiMCAdaptive:
    ENABLE_ADAPTIVE_BETA: False
    ENABLE_ADAPTIVE_TEXT: False
    ENABLE_ADAPTIVE_VISION: False
    USE_PROMPT_ENSEMBLE: False
    USE_AGREEMENT_GATE: True
    AGREEMENT_POWER: 1.0
    MIN_AGREEMENT: 0.05
    BETA_MODE: "classwise"
    PRIOR_MODE: "fixed"
    UNIVERSAL_BETA: 0.5

  BiMCOracle:
    ENABLE: True
    MODE: "joint"
    SEARCH_METRIC: "acc"
    BETA_GRID_SIZE: 19
    DEFAULT_DELTA: 0.0
    DEFAULT_TAU: 1.0
    DELTA_MIN: -1.5
    DELTA_MAX: 1.5
    DELTA_GRID_SIZE: 25
    TAU_VALUES: [0.5, 0.75, 1.0, 1.25, 1.5, 2.0, 3.0]
