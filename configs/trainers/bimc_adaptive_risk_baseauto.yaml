METHOD: "bimc_adaptive"
SEED: 1

DEVICE:
  DEVICE_NAME: "cuda"
  GPU_ID: "0;"

DATALOADER:
  TRAIN:
    BATCH_SIZE_BASE: 64
    BATCH_SIZE_INC: 64
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 4

MODEL:
  BACKBONE:
    NAME: "ViT-B/16"

TRAINER:
  BiMC:
    PREC: "fp16"
    VISION_CALIBRATION: True
    LAMBDA_I: 0.1
    TAU: 16
    TEXT_CALIBRATION: True
    LAMBDA_T: 0.5
    GAMMA_BASE: 1.0
    GAMMA_INC: 5.0
    USING_ENSEMBLE: False

  BiMCAdaptive:
    ENABLE_ADAPTIVE_BETA: True
    ENABLE_ADAPTIVE_TEXT: True
    ENABLE_ADAPTIVE_VISION: False
    USE_PROMPT_ENSEMBLE: True
    PROMPT_TEMPLATES:
      - "a photo of a {}."
      - "a close-up photo of a {}."
      - "a centered photo of a {}."
      - "a bright photo of a {}."
      - "a cropped photo of a {}."
      - "a clean photo of a {}."
      - "a detailed photo of a {}."
    USE_AGREEMENT_GATE: True
    AGREEMENT_POWER: 1.0
    MIN_AGREEMENT: 0.05
    BETA_MODE: "session_risk"
    PRIOR_MODE: "base_auto"
    UNIVERSAL_BETA: 0.5
    EPS: 1.0e-6
    MAX_KAPPA: 1000.0
    SINGLETON_KAPPA: 1.0
    RELIABILITY_COUNT_POWER: 0.5
    RELIABILITY_LOGIT_SCALE: 0.5
    BETA_SHRINKAGE_NU: 5.0
    TEXT_SHRINKAGE_NU: 8.0
    VISION_SHRINKAGE_NU: 5.0
    MIN_WEIGHT: 0.05
    MAX_WEIGHT: 0.95
    MIN_VISION_WEIGHT: 0.0
    MAX_VISION_WEIGHT: 0.35
    SESSION_RISK_GRID_SIZE: 31
    SESSION_RISK_REG_LAMBDA: 0.05
    SESSION_RISK_MAX_SUPPORT_PER_CLASS: 32
    SESSION_RISK_USE_CURRENT_TASK_ONLY: True
    SESSION_RISK_INCLUDE_ENSEMBLE: True
    AUTO_PRIOR_GRID_SIZE: 31
    AUTO_PRIOR_REG_LAMBDA: 0.02
    AUTO_PRIOR_CALIB_FRACTION: 0.2
    AUTO_PRIOR_MAX_CALIB_PER_CLASS: 32
    AUTO_PRIOR_MIN_PROTO_PER_CLASS: 8
